    <main>
        <section class="section-contact">
            <h2>Contactez-moi</h2>
            
            <div class="contact-wrapper">
                <div class="contact-info">
                    <h3>Mes Coordonnées</h3>
                    <p>N'hésitez pas à me contacter pour toute collaboration ou question technique.</p>
                    
                    <div class="info-item">
                        <i class="fa-solid fa-location-dot"></i>
                        <span>Lubumbashi, Haut-Katanga, RDC</span>
                    </div>

                    <div class="info-item">
                        <i class="fa-solid fa-phone"></i>
                        <span>+243 997100105</span>
                    </div>

                    <div class="social-contact">
                        <a href="https://wa.me/243997100105" target="_blank" class="btn-social whatsapp">
                            <i class="fa-brands fa-whatsapp"></i> WhatsApp
                        </a>
                        <a href="https://t.me/+243997100105" target="_blank" class="btn-social telegram">
                            <i class="fa-brands fa-telegram"></i> Telegram
                        </a>
                    </div>
                </div>

                <div class="contact-form-container">
                    <form action="#" class="contact-form">
                        <div class="form-group">
                            <label for="nom">Nom Complet</label>
                            <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
                        </div>
                        <div class="form-group">
                            <label for="telephone">Téléphone</label>
                            <input type="tel" id="telephone" name="telephone" placeholder="+243..." required>
                        </div>
                        <button type="submit" class="submit-btn">Envoyer le message</button>
                    </form>
                </div>
            </div>
